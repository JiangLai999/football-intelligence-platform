version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: football-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: football_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
